<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Cơm Tấm AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Làm đẹp cái bảng thông tin một xíu */
      #ui-panel {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        z-index: 1000;
        font-family: Arial, sans-serif;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        width: 80%;
        max-width: 300px;
      }
      .hidden { display: none; }
      button {
        background-color: #ff4757;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="ui-panel" class="hidden">
      <h3 style="margin-top: 0; color: #2f3542;">🍛 Cơm Tấm Sài Gòn</h3>
      <p style="font-size: 14px; margin: 5px 0;">🐷 Sườn Nướng | 🥚 Trứng | 🐟 Nước Mắm</p>
      <button onclick="window.open('https://maps.google.com', '_blank')">TÌM QUÁN GẦN NHẤT 📍</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="comTamModel" src="./com_tam.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="90 0 0" position="0 0 0" scale="0.5 0.5 0.5" src="#comTamModel" animation="property: rotation; to: 90 360 0; dur: 10000; easing: linear; loop: true;"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('[mindar-image-target="targetIndex: 0"]');
      const uiPanel = document.querySelector('#ui-panel');
      
      // Khi soi thấy móc khóa -> Hiện bảng thông tin
      target.addEventListener("targetFound", event => {
        uiPanel.classList.remove("hidden");
      });
      // Khi đưa điện thoại ra chỗ khác -> Ẩn bảng thông tin
      target.addEventListener("targetLost", event => {
        uiPanel.classList.add("hidden");
      });
    </script>
  </body>
</html>
